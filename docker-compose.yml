services:

  postgres:
    image: postgres:14-alpine
    container_name: bagana-ai-db
    restart: always
    environment:
      # Harus sama dengan DB_NAME di .env Next.js (satu database untuk users/sessions)
      POSTGRES_DB: ${DB_NAME:-bagana_ai_cp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bagana-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bagana-ai-backend
    restart: always
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      # Jangan set DATABASE_URL di sini dengan ${DB_PASSWORD}: karakter seperti @ dalam password
      # memecah URL (host jadi "…@postgres"). backend/main.py membangun URL dengan quote_plus dari DB_*.
      DB_HOST: postgres
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY:-super-secret-key}
      # OPENAI_* / OPENROUTER_*: hanya dari env_file .env (hindari warning Compose + timpa kosong)
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - bagana-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bagana-ai-frontend
    restart: always
    # Wajib production: jangan pakai `next dev` di VPS (log "Compiled /api/crew" = dev mode = route lama).
    command: ["npm", "run", "start"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # BFF / API routes: ke FastAPI lewat nama service Docker (bukan localhost)
      BACKEND_API_URL: http://backend:8000
      USE_BACKEND_API: "true"
      NEXT_PUBLIC_API_URL: http://localhost:8000
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-bagana_ai_cp}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      # Harus sama dengan service backend agar header X-Bagana-Crew-Internal valid
      SECRET_KEY: ${SECRET_KEY:-super-secret-key}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bagana-network

volumes:
  postgres_data:

networks:
  bagana-network:
    driver: bridge